name: Build Executables

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact_name: FuzzyDuplicateFinder.exe
            artifact_path: dist/FuzzyDuplicateFinder.exe
          - os: ubuntu-latest
            name: Linux
            artifact_name: FuzzyDuplicateFinder
            artifact_path: dist/FuzzyDuplicateFinder
          - os: macos-latest
            name: macOS
            artifact_name: FuzzyDuplicateFinder.app
            artifact_path: dist/FuzzyDuplicateFinder.app

    name: Build for ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsm6 libxext6 libxrender-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller FuzzyDuplicateFinder.spec

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FuzzyDuplicateFinder-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 90